<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy 4th Anniversary 💕</title>
  <link rel="icon" type="image/png" href="icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="cover.css"/>
</head>
<body>

  <!-- ═══ COVER PAGE ═══ -->
  <main class="cover" id="coverStage">

    <!-- Decorative: lace hearts — index + first section only -->
    <img src="lace-heart.svg" class="deco deco-heart deco-heart-1" aria-hidden="true" alt=""/>

    <!-- Decorative: gem chain -->
    <img src="gem-chain.svg" class="deco deco-chain deco-chain-1" aria-hidden="true" alt=""/>
    <img src="gem-chain.svg" class="deco deco-chain deco-chain-2" aria-hidden="true" alt=""/>

    <!-- Decorative: ribbon -->
    <img src="ribbon.png" class="deco deco-ribbon deco-ribbon-1" aria-hidden="true" alt=""/>

    <!-- Tulip left -->
    <img src="tulip1.png" class="deco deco-tulip deco-tulip-cover-l" aria-hidden="true" alt=""/>
    <!-- Tulip right — always right, partial crop -->
    <img src="tulip3.png" class="deco deco-tulip deco-tulip-cover-r" aria-hidden="true" alt=""/>

    <!-- Center content -->
    <div class="cover-inner">
      <p class="cover-eyebrow float-text">with all my heart</p>

      <h1 class="cover-title">
        <span class="ct-happy">Happy</span>
        <span class="ct-anni">Anniversary</span>
        <span class="ct-happy ct-mylove">my love</span>
      </h1>

      <div class="cover-years float-num">4</div>
      <p class="cover-sub float-text">years of us &nbsp;·&nbsp; years of love</p>

      <p class="swipe-hint float-text" aria-hidden="true">
        <span>swipe left to open</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </p>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
